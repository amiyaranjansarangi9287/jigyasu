name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: TypeCheck · Build · Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        # --frozen-lockfile: fail if lockfile is out of sync (protects against supply chain drift)
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm --filter @jigyasu/hub exec tsc -b --noEmit

      - name: Production build
        run: pnpm --filter @jigyasu/hub build
        env:
          # Sentry DSN is intentionally absent in CI — builds succeed without it.
          # The real DSN is set as a secret in your cloud deployment environment.
          VITE_SENTRY_DSN: ''

      - name: Lint
        run: pnpm --filter @jigyasu/hub lint

  accessibility:
    name: Accessibility Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run accessibility tests
        run: pnpm test:e2e accessibility-automated.spec.ts

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: playwright-report/
          retention-days: 30
